    <style>
        :root {

            --accent: #2563EB; --accent-light: #DBEAFE; --border: #E2DDD5;
            --card: #FFFFFF; --card-hover: rgba(0,0,0,.03);
            --sb-bg: #1A1A1A; --sb-text: #F0EDE7; --sb-muted: #888; --sb-accent: #7CB9FF;
            --sw: 280px; --fb: 'DM Sans','Noto Sans KR',sans-serif; --fm: 'JetBrains Mono',monospace;
            --ease: cubic-bezier(.25,.46,.45,.94);
            --badge-bg: #EEF2FF; --badge-text: #3730A3;
            --badge-green-bg: #ECFDF5; --badge-green-text: #065F46;
            --badge-orange-bg: #FFF7ED; --badge-orange-text: #9A3412;
            --badge-purple-bg: #F5F3FF; --badge-purple-text: #5B21B6;
            --badge-gray-bg: #F3F4F6; --badge-gray-text: #374151;
        }
        [data-theme="dark"] {
            --cream: #181A1B; --ink: #E8E4DC; --ink-light: #C5C0B7; --ink-faint: #9A948C;
            --accent: #60A5FA; --accent-light: rgba(96,165,250,.15); --border: #3A352F;
            --card: #212322; --card-hover: rgba(255,255,255,.03);
            --sb-bg: #111312; --sb-text: #E8E4DC; --sb-muted: #777; --sb-accent: #93C5FD;
            --badge-bg: #1E2460; --badge-text: #93C5FD;
            --badge-green-bg: #022C22; --badge-green-text: #6EE7B7;
            --badge-orange-bg: #431407; --badge-orange-text: #FED7AA;
            --badge-purple-bg: #2E1065; --badge-purple-text: #C4B5FD;
            --badge-gray-bg: #1F2937; --badge-gray-text: #D1D5DB;
        }

        * { box-sizing: border-box; margin: 0; padding: 0 }
        html { scroll-behavior: smooth }
        body { font-family: var(--fb); background: var(--cream); color: var(--ink); line-height: 1.7; font-size: 15px; transition: background .25s, color .25s }

        /* ── Top Bar ── */
        .top-bar { position: fixed; top: 20px; right: 24px; z-index: 1000; display: flex; gap: 12px }
        .toggle-group { display: flex; background: rgba(255,255,255,.8); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 100px; padding: 4px; box-shadow: 0 2px 10px rgba(0,0,0,.05) }
        [data-theme="dark"] .toggle-group { background: rgba(30,32,33,.8) }
        .toggle-btn { background: transparent; border: none; padding: 5px 12px; font-family: var(--fb); font-size: 12px; font-weight: 600; color: var(--ink-faint); border-radius: 100px; cursor: pointer; transition: all .2s }
        .toggle-btn.active { background: var(--ink); color: var(--cream) }
        [data-theme="dark"] .toggle-btn.active { background: var(--accent); color: #fff }

        /* ── Sidebar ── */
        .sidebar { position: fixed; top: 0; left: 0; width: var(--sw); height: 100vh; background: var(--sb-bg); color: var(--sb-text); z-index: 100; overflow-y: auto }
        .sidebar-inner { padding: 40px 32px; display: flex; flex-direction: column; min-height: 100% }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255,255,255,0.1); margin: 0 auto 20px; display: block }
        .profile-name { font-size: 1.4rem; color: #fff; font-weight: 700; text-align: center; margin-bottom: 4px }
        .profile-role { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--sb-muted); font-weight: 500; text-align: center; margin-bottom: 24px }
        .contact-item { display: flex; align-items: center; gap: 10px; font-size: 12px; color: rgba(240,237,231,.7); text-decoration: none; margin-bottom: 12px; transition: color .2s }
        .contact-item:hover { color: var(--sb-accent) }
        .linkedin-link { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(240,237,231,.7); text-decoration: none; transition: color .2s }
        .linkedin-link:hover { color: var(--sb-accent) }
        .linkedin-icon { width: 16px; height: 16px; flex-shrink: 0 }
        .nav-link { display: block; padding: 10px 14px; font-size: 13px; font-weight: 500; color: rgba(240,237,231,.5); text-decoration: none; border-radius: 8px; transition: all .2s }
        .nav-link:hover, .nav-link.active { color: var(--sb-accent); background: rgba(255,255,255,.05) }

        /* ── Main ── */
        .main-content { margin-left: var(--sw); padding: 80px 64px; max-width: 1200px }
        .content-section { margin-bottom: 64px; scroll-margin-top: 80px }
        .section-header { display: flex; align-items: center; gap: 20px; margin-bottom: 32px }
        .section-title { font-size: 1.5rem; font-weight: 700; color: var(--ink); text-transform: uppercase; letter-spacing: 1px }
        .section-line { flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent) }

        /* ── Cards ── */
        .entry-card {
            border: 1px solid var(--border); border-radius: 16px; background: var(--card);
            padding: 24px 32px; margin-bottom: 20px; transition: all .3s var(--ease);
        }
        .entry-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,.08); border-color: var(--accent) }
        [data-theme="dark"] .entry-card:hover { box-shadow: 0 10px 28px rgba(0,0,0,.3) }
        .entry-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; flex-wrap: wrap; gap: 8px }
        .entry-title { font-size: 16px; font-weight: 700; color: var(--ink) }
        .entry-period { font-family: var(--fm); font-size: 11px; color: var(--accent); font-weight: 600; white-space: nowrap }
        .entry-sub { font-size: 13px; color: var(--ink-faint); font-weight: 500; margin-bottom: 14px }
        .bullet-list { list-style: none; margin-top: 10px }
        .bullet-list li { position: relative; padding-left: 20px; font-size: 14px; color: var(--ink-light); margin-bottom: 8px; line-height: 1.65 }
        .bullet-list li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-weight: bold }

        /* ── Skill Badges ── */
        .skill-section-block { margin-bottom: 28px }
        .skill-cat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--accent); margin-bottom: 12px; display: block }
        .badge-wrap { display: flex; flex-wrap: wrap; gap: 8px }
        .badge {
            display: inline-block; padding: 4px 12px; border-radius: 100px;
            font-size: 12px; font-weight: 600; line-height: 1.6;
            transition: transform .15s, box-shadow .15s;
        }
        .badge:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,.12) }
        .badge-blue   { background: var(--badge-bg);        color: var(--badge-text) }
        .badge-green  { background: var(--badge-green-bg);  color: var(--badge-green-text) }
        .badge-orange { background: var(--badge-orange-bg); color: var(--badge-orange-text) }
        .badge-purple { background: var(--badge-purple-bg); color: var(--badge-purple-text) }
        .badge-gray   { background: var(--badge-gray-bg);   color: var(--badge-gray-text) }

        /* ── Badge Tooltip ── */
        .badge-wrap { position: relative }
        .badge { position: relative }
        .badge .tooltip {
            visibility: hidden; opacity: 0;
            position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
            background: var(--ink); color: var(--cream);
            border-radius: 10px; padding: 7px 12px;
            white-space: nowrap; pointer-events: none;
            transition: opacity .18s var(--ease), transform .18s var(--ease);
            transform: translateX(-50%) translateY(4px);
            z-index: 999; box-shadow: 0 4px 16px rgba(0,0,0,.18);
        }
        .badge .tooltip::after {
            content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            border: 5px solid transparent; border-top-color: var(--ink);
        }
        .badge:hover .tooltip {
            visibility: visible; opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .tooltip-label {
            font-size: 11px; font-weight: 700; letter-spacing: .06em;
            text-transform: uppercase; display: block; margin-bottom: 4px;
            color: var(--sb-accent);
        }
        .tooltip-dots {
            display: flex; gap: 4px; justify-content: center;
        }
        .tooltip-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: rgba(255,255,255,.25);
        }
        .tooltip-dot.filled { background: var(--sb-accent) }

        /* ── Awards ── */
        .award-card { display: flex; align-items: flex-start; gap: 20px; padding: 20px 28px; border: 1px solid var(--border); border-radius: 14px; background: var(--card); margin-bottom: 16px; transition: all .3s var(--ease) }
        .award-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.07); border-color: var(--accent) }
        .award-icon { font-size: 28px; line-height: 1; flex-shrink: 0; margin-top: 2px }
        .award-title { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 3px }
        .award-sub { font-size: 13px; color: var(--ink-faint) }
        .award-year { font-family: var(--fm); font-size: 11px; color: var(--accent); font-weight: 600; margin-top: 4px }

        @media(max-width: 900px) {
            .sidebar { display: none }
            .main-content { margin-left: 0; padding: 60px 24px }
        }
    </style>
</head>

let lang = 'en';

function render() {
    // Sidebar
    document.getElementById('sidebar-name').textContent = D.info.name[lang];
    document.getElementById('sidebar-role').textContent = D.info.role[lang];
    document.getElementById('about-text').innerHTML = D.info.about[lang];

    // Section titles
    const titles = {
        't-about':  ['About','소개'],
        't-edu':    ['Education','학력'],
        't-exp':    ['Experience','경력'],
        't-res':    ['Research','연구'],
        't-proj':   ['Projects','프로젝트'],
        't-awards': ['Awards','수상'],
        't-skill':  ['Skills','기술 스택'],
        't-lead':   ['Leadership','리더십']
    };
    Object.keys(titles).forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = lang === 'en' ? titles[id][0] : titles[id][1];
    });

    // Nav links
    document.querySelectorAll('.nav-link').forEach(el => el.textContent = el.getAttribute('data-' + lang));

    // Education
    document.getElementById('edu-list').innerHTML = D.education.map(e => `
        <div class="entry-card">
            <div class="entry-header">
                <div class="entry-title">${e.school[lang]}</div>
                <div class="entry-period">${e.period}</div>
            </div>
            <div class="entry-sub">${e.degree[lang]}</div>
            <p style="font-size:13px;color:var(--ink-faint);line-height:1.75">${e.desc[lang]}</p>
        </div>
    `).join('');

    // Experience
    document.getElementById('exp-list').innerHTML = D.experience.map(e => `
        <div class="entry-card">
            <div class="entry-header">
                <div class="entry-title">${e.company[lang]}</div>
                <div class="entry-period">${e.period}</div>
            </div>
            <div class="entry-sub">${e.role[lang]} &nbsp;·&nbsp; ${e.location[lang]}</div>
            ${e.desc[lang]}
        </div>
    `).join('');

    // Research
    document.getElementById('res-list').innerHTML = D.research.map(e => `
        <div class="entry-card">
            <div class="entry-header">
                <div class="entry-title">${e.org[lang]}</div>
                <div class="entry-period">${e.period}</div>
            </div>
            <div class="entry-sub">${e.role[lang]} &nbsp;·&nbsp; ${e.location[lang]}</div>
            ${e.desc[lang]}
        </div>
    `).join('');

    // Projects
    document.getElementById('proj-list').innerHTML = D.projects.map(p => `
        <div class="entry-card">
            <div class="entry-header">
                <div class="entry-title">${p.name[lang]}</div>
                <div class="entry-period">${p.period}</div>
            </div>
            <div class="entry-sub">${p.role[lang]}</div>
            ${p.desc[lang]}
        </div>
    `).join('');

    // Awards
    document.getElementById('awards-list').innerHTML = D.awards.map(a => `
        <div class="award-card">
            <div class="award-icon">${a.icon}</div>
            <div>
                <div class="award-title">${a.title[lang]}</div>
                <div class="award-sub">${a.sub[lang]}</div>
                <div class="award-year">${a.year}</div>
            </div>
        </div>
    `).join('');

    // Skills (badges with hover tooltip)
    const colorMap = { blue:'badge-blue', purple:'badge-purple', green:'badge-green', orange:'badge-orange', gray:'badge-gray' };
    const levelLabel = { en: ['','Beginner','Basic','Proficient','Advanced','Expert'], kr: ['','입문','초급','중급','고급','전문가'] };
    document.getElementById('skill-list').innerHTML = D.skills[lang].map(s => `
        <div class="skill-section-block">
            <span class="skill-cat-label">${s.cat}</span>
            <div class="badge-wrap">
                ${s.list.map(item => {
                    const dots = Array.from({length:5}, (_,i) =>
                        `<div class="tooltip-dot${i < item.l ? ' filled' : ''}"></div>`
                    ).join('');
                    return `<span class="badge ${colorMap[s.color]}">
                        ${item.n}
                        <span class="tooltip">
                            <span class="tooltip-label">${levelLabel[lang][item.l]}</span>
                            <span class="tooltip-dots">${dots}</span>
                        </span>
                    </span>`;
                }).join('')}
            </div>
        </div>
    `).join('');

    // Leadership
    document.getElementById('lead-list').innerHTML = D.leadership.map(e => `
        <div class="entry-card">
            <div class="entry-header">
                <div class="entry-title">${e.org[lang]}</div>
                <div class="entry-period">${e.period}</div>
            </div>
            <div class="entry-sub">
                ${e.unit ? `<span style="color:var(--ink-faint);font-size:12px;">${e.unit[lang]}</span> &nbsp;|&nbsp; ` : ''}${e.role[lang]} &nbsp;·&nbsp; ${e.location[lang]}
            </div>
            ${e.desc[lang]}
        </div>
    `).join('');
}

// Theme
document.getElementById('theme-light').onclick = () => {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('theme-light').classList.add('active');
    document.getElementById('theme-dark').classList.remove('active');
};
document.getElementById('theme-dark').onclick = () => {
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('theme-dark').classList.add('active');
    document.getElementById('theme-light').classList.remove('active');
};

// Language
document.getElementById('lang-en').onclick = () => { lang='en'; document.getElementById('lang-en').classList.add('active'); document.getElementById('lang-kr').classList.remove('active'); render(); };
document.getElementById('lang-kr').onclick = () => { lang='kr'; document.getElementById('lang-kr').classList.add('active'); document.getElementById('lang-en').classList.remove('active'); render(); };

render();
</script>
</body>
</html>
